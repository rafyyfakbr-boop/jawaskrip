<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let a = 8.3;
        let c = parseFloat('3.2');

        let addition = a + c;
        let subtraction = a - c;
        let multiplication = a * c;
        let division = a / c;
        let modulus = a % c;

        document.write(`8.3 + 3.2 = ${addition} <br>`);
        document.write(`8.3 – 3.2 = ${subtraction.toFixed(1)}<br>`);
        document.write(`8.3 × 3.2 = ${multiplication.toFixed(2)} <br>`);
        document.write(`8.3 ÷ 3.2 = ${division.toFixed(5)} <br>`);
        document.write(`8 % 3 = ${modulus.toFixed(0)} <br>`);

    </script>
</body>
</html>
